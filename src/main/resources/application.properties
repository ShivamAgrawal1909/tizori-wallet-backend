spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=${PORT:8080}

# Kafka settings
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.listener.auto-startup=${KAFKA_AUTO_STARTUP:false}
spring.kafka.consumer.group-id=ewallet-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.properties.security.protocol=SSL
spring.kafka.properties.ssl.truststore.location=${KAFKA_TRUSTSTORE_LOCATION:}
spring.kafka.properties.ssl.truststore.password=${KAFKA_TRUSTSTORE_PASSWORD:}
spring.kafka.properties.ssl.keystore.location=${KAFKA_KEYSTORE_LOCATION:}
spring.kafka.properties.ssl.keystore.password=${KAFKA_KEYSTORE_PASSWORD:}
spring.kafka.properties.ssl.key.password=${KAFKA_KEY_PASSWORD:}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

jwt.secret=${JWT_SECRET}
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false